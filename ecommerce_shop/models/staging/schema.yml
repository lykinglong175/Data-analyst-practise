version: 2

models:
  - name: stg_users
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id
      - name: status
        data_tests:
          - accepted_values:
              values: ['completed', 'returned']

  - name: stg_products
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: stg_order_items
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id